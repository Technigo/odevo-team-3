<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <title>Add Book</title>
</head>
<body>
  <h1>Add New Book</h1>
  <main>
    <form id="addForm">
      <label>
        Title<br />
        <input name="title" required />
      </label>
      <br />
      <label>
        Author<br />
        <input name="author" required />
      </label>
      <br />
      <label>
        Year<br />
        <input name="year" type="number" />
      </label>
      <br />
      <label>
        Genre<br />
        <input name="genre" />
      </label>
      <br />
      <label>
        Rating<br />
        <input name="rating" type="number" step="0.01" min="0" max="5" />
      </label>
      <br />
      <label>
        Description<br />
        <textarea name="description"></textarea>
      </label>
      <br />
      <label>
        Image URL<br />
        <input name="image" placeholder="./book-images/your-file.jpg" />
      </label>
      <br />
      <label>
        Format<br />
        <select name="format">
          <option>Hardback</option>
          <option>Digital</option>
        </select>
      </label>
      <br />
      <button type="submit">Submit</button>
      <button type="button" id="cancel">Cancel</button>
    </form>
  </main>

  <script>
    function getAddedBooks() {
      try { return JSON.parse(localStorage.getItem('addedBooks')||'[]') } catch(e){return[]}
    }

    const modalHtml = `
      <div id="addedModal" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4)">
        <div style="background:var(--pompey-white);padding:20px;border-radius:8px;border:4px solid var(--pompey-blue);max-width:90%;width:360px;text-align:center;">
          <h2 style="margin-top:0;color:var(--pompey-dark)">Book added</h2>
          <p style="color:var(--pompey-dark)">Your book was added successfully.</p>
          <button id="modalOk" type="button" style="margin-top:8px;padding:8px 16px;border:2px solid var(--pompey-blue);background:var(--pompey-blue);color:var(--pompey-white);border-radius:6px;">OK</button>
        </div>
      </div>`

    document.getElementById('addForm').addEventListener('submit', (e)=>{
      e.preventDefault()
      const f = e.target
      const newBook = {
        title: f.title.value.trim(),
        author: f.author.value.trim(),
        year: Number(f.year.value) || null,
        genre: f.genre.value.trim(),
        rating: f.rating.value ? Number(f.rating.value) : null,
        description: f.description.value.trim(),
        image: f.image.value.trim() || './book-images/unknown.jpg',
        format: f.format.value
      }
      const arr = getAddedBooks()
      arr.push(newBook)
      localStorage.setItem('addedBooks', JSON.stringify(arr))

      // show confirmation modal
      const div = document.createElement('div')
      div.innerHTML = modalHtml
      document.body.appendChild(div)
      const modal = document.getElementById('addedModal')
      const ok = document.getElementById('modalOk')
      ok.addEventListener('click', ()=> {
        // remove modal and go back
        if (modal && modal.parentNode) modal.parentNode.removeChild(modal)
        location.href = 'index.html'
      })
      // auto-redirect after 2s as backup
      setTimeout(()=>{ location.href='index.html' }, 2000)
    })

    document.getElementById('cancel').addEventListener('click', ()=> location.href='index.html')
  </script>
</body>
</html>
